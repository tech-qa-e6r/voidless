<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guide — Voidless</title>
  <meta name="description" content="Voidless user guide." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .guide-list {
      max-width: 1000px;
      margin: 0 auto;
      padding: 70px 28px 90px;
      display: flex;
      flex-direction: column;
      gap: 64px;
    }
    .guide-list > h2 {
      font-size: 28px;
      letter-spacing: -0.01em;
      margin: 0 0 8px;
    }
    .guide-item {
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-margin-top: 80px;
    }
    .guide-title {
      font-family: var(--mono, ui-monospace, monospace);
      font-size: 18px;
      font-weight: 600;
      color: var(--accent-hi);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .guide-title .num {
      font-size: 12px;
      color: var(--text-mute);
      font-weight: 500;
    }
    .guide-gif {
      width: 100%;
      max-width: 900px;
      height: auto;
      display: block;
      border: 1px solid var(--border-2);
      border-radius: 10px;
      background: var(--bg-soft);
    }
  </style>
</head>
<body>
  <!-- ── Nav ── -->
  <header class="nav">
    <a class="nav-brand" href="/">
      <span class="dot"></span> Voidless
    </a>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/changelog">Changes</a>
    </nav>
  </header>

  <!-- ── Guide ── -->
  <main class="guide-list">
    <h2>Guide</h2>

    <article class="guide-item" id="live-preview">
      <h3 class="guide-title"><span class="num">01</span> Live Preview</h3>
      <video class="guide-gif" src="001_Live_preview.mp4" autoplay muted loop playsinline controls controlslist="nodownload" preload="metadata"></video>
    </article>

    <article class="guide-item" id="split-drag">
      <h3 class="guide-title"><span class="num">02</span> Split &amp; Drag</h3>

  </main>

  <footer class="footer">

</html>
